<div class="page-layout-container" id="resetPasswordWorkspace">
    <div class="admin-login-container">
        <div class="admin-login-wrapper glass-card">
            
            <div class="login-header">
                <div class="login-logo-circle">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <h2>Yeni Şifre Belirleme</h2>
                <p>Güvenliğiniz için yeni bir şifre girin.</p>
            </div>

            <form (ngSubmit)="onSubmit()" class="login-form" *ngIf="token && !successMessage">
                <div class="form-group">
                    <label for="newPassword">Yeni Şifre</label>
                    <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required placeholder="En az 6 karakter girin">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Yeni Şifre Tekrar</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="Şifrenizi doğrulayın">
                </div>

                <div class="login-error-alert" *ngIf="errorMessage">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span>{{ errorMessage }}</span>
                </div>

                <button type="submit" class="btn btn-primary login-submit-btn" [disabled]="isSubmitting">
                    <span *ngIf="!isSubmitting">Şifreyi Güncelle</span>
                    <span *ngIf="isSubmitting">Güncelleniyor...</span>
                </button>
            </form>

            <div class="status-box" *ngIf="successMessage || !token">
                <div class="login-success-alert" *ngIf="successMessage">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    <span>{{ successMessage }}</span>
                </div>

                <div class="login-error-alert" *ngIf="errorMessage && !successMessage">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <span>{{ errorMessage }}</span>
                </div>

                <a routerLink="/admin" class="login-back-btn" style="display: block; margin-top: 20px;">
                    Giriş Sayfasına Git
                </a>
            </div>

        </div>
    </div>
</div>
