<div class="app-container page-layout-container" id="adminWorkspace" *ngIf="profile">
    
    <!-- Sidebar Navigation panel -->
    <aside class="profile-sidebar" aria-label="Yönetim Menüsü">
        <div class="profile-card-content glass-card">
            <div class="avatar-container">
                <img [src]="profile.avatarUrl || 'assets/avatar_senior.png'" alt="Yönetici" class="profile-avatar" id="adminAvatarPreview">
            </div>
            
            <h3 class="profile-name" id="adminNameHeader">{{ profile.name }}</h3>
            <p class="profile-tag" style="margin-bottom: 24px;">Sistem Yöneticisi</p>
            
            <!-- Sidebar Tab buttons -->
            <div class="admin-menu-tabs">
                <button class="admin-menu-tab" [class.active]="activeTab === 'panelOverview'" (click)="switchTab('panelOverview')">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    <span>Genel Bakış</span>
                </button>
                <button class="admin-menu-tab" [class.active]="activeTab === 'panelProfile'" (click)="switchTab('panelProfile')">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Profil Ayarları</span>
                </button>
                <button class="admin-menu-tab" [class.active]="activeTab === 'panelProjects'" (click)="switchTab('panelProjects')">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><polygon points="12 2 2 7 12 12 22 7 12 2 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    <span>Projeleri Yönet</span>
                </button>
                <button class="admin-menu-tab" [class.active]="activeTab === 'panelBlog'" (click)="switchTab('panelBlog')">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>Blog Yönetimi</span>
                </button>
                <button class="admin-menu-tab" [class.active]="activeTab === 'panelMessages'" (click)="switchTab('panelMessages')">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <span>Gelen Mesajlar</span>
                    <span class="unread-count-badge" *ngIf="unreadMessagesCount > 0">{{ unreadMessagesCount }}</span>
                </button>
                <button routerLink="/" class="admin-menu-tab logout-tab">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span>Siteye Geri Dön</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content Area Panels -->
    <main class="profile-main" aria-label="Yönetim Panelleri">
        <div class="main-content-pane glass-card">
            <app-admin-overview *ngIf="activeTab === 'panelOverview'"></app-admin-overview>
            <app-admin-profile *ngIf="activeTab === 'panelProfile'"></app-admin-profile>
            <app-admin-projects *ngIf="activeTab === 'panelProjects'"></app-admin-projects>
            <app-admin-blog *ngIf="activeTab === 'panelBlog'"></app-admin-blog>
            <app-admin-messages *ngIf="activeTab === 'panelMessages'"></app-admin-messages>
        </div>
    </main>
</div>
