<div class="admin-panel-title-row">
    <div class="pane-header-hero">
        <span class="subtitle-tag">PORTFOLYO METRİKLERİ</span>
        <h3 class="pane-main-title">Projeleri Yönet</h3>
        <div class="title-decorator-line"></div>
    </div>
    <button class="btn btn-primary btn-add-new" (click)="openNewProjectModal()">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" class="btn-icon-left"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Yeni Proje Ekle</span>
    </button>
</div>

<!-- Projects list Table layout -->
<div class="table-wrapper">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Proje Başlığı (TR)</th>
                <th>Kategori</th>
                <th>Tarih</th>
                <th>Müşteri</th>
                <th style="width: 150px; text-align: center;">İşlemler</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let proj of projects; let idx = index">
                <td style="font-weight: 700; color: var(--accent-navy-text, var(--accent-navy));">{{ proj.title_TR }}</td>
                <td><span class="project-category-tag category-tag-{{proj.category}}">{{ proj.category }}</span></td>
                <td>{{ proj.date }}</td>
                <td>{{ proj.client }}</td>
                <td>
                    <div class="actions-col-cell">
                        <button class="btn-action-edit" (click)="openEditProjectModal(idx)" title="Düzenle">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="btn-action-delete" (click)="deleteProject(idx)" title="Sil">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr *ngIf="projects.length === 0">
                <td colspan="5" style="text-align: center; padding: 24px;">Kayıtlı proje bulunmamaktadır.</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- PROJECT CRUD FORM MODAL OVERLAY -->
<div id="projectCrudModal" class="modal-overlay" [class.show]="showProjectModal" role="dialog" aria-modal="true" aria-labelledby="projModalTitle">
    <div class="modal-content glass-card admin-modal">
        <button class="modal-close-btn" (click)="closeProjectModal()" aria-label="Close modal">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        
        <h2 id="projModalTitle" class="modal-title">{{ projectModalTitle }}</h2>
        <p class="modal-subtitle">Projeye ait tüm genel ve çok dilli detayları girin.</p>
        
        <form (ngSubmit)="saveProject()" class="contact-form">
            <!-- General Settings Section -->
            <div class="form-double-row">
                <div class="form-group">
                    <label for="crudProjId">Proje ID / Slug (Değiştirilemez)</label>
                    <input type="text" id="crudProjId" name="projId" [(ngModel)]="projId" required placeholder="Örn: platar-lpr" [disabled]="editingProjectIdx >= 0">
                </div>
                <div class="form-group">
                    <label for="crudProjCategory">Kategori</label>
                    <select id="crudProjCategory" name="projCategory" [(ngModel)]="projCategory" class="admin-select" required>
                        <option value="web">Web</option>
                        <option value="ai-rag">AI &amp; RAG</option>
                        <option value="ml-dl">ML &amp; DL</option>
                        <option value="other">Diğer</option>
                    </select>
                </div>
            </div>

            <div class="form-double-row">
                <div class="form-group">
                    <label for="crudProjDate">Tarih</label>
                    <input type="text" id="crudProjDate" name="projDate" [(ngModel)]="projDate" required placeholder="Örn: Haziran 2026">
                </div>
                <div class="form-group">
                    <label for="crudProjClient">Müşteri</label>
                    <input type="text" id="crudProjClient" name="projClient" [(ngModel)]="projClient" required placeholder="Örn: Platar Tech">
                </div>
            </div>

            <div class="form-double-row">
                <div class="form-group">
                    <label for="crudProjTech">Teknolojiler (Virgülle Ayırın)</label>
                    <input type="text" id="crudProjTech" name="projTech" [(ngModel)]="projTech" required placeholder="Örn: C#, YOLOv8, SignalR">
                </div>
                <div class="form-group">
                    <label for="crudProjRepo">GitHub Repo URL</label>
                    <input type="url" id="crudProjRepo" name="projRepo" [(ngModel)]="projRepo" required>
                </div>
            </div>

            <div class="form-group">
                <label for="crudProjDemo">Demo URL (Boş bırakabilirsiniz)</label>
                <input type="text" id="crudProjDemo" name="projDemo" [(ngModel)]="projDemo" placeholder="Örn: portfolio/platar-lpr">
            </div>

            <!-- Language Translation Tabs Switcher -->
            <div class="modal-tabs">
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'tr'" (click)="activeFormTab = 'tr'">Türkçe (TR)</button>
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'en'" (click)="activeFormTab = 'en'">English (EN)</button>
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'de'" (click)="activeFormTab = 'de'">Deutsch (DE)</button>
            </div>

            <!-- Tab content: Türkçe -->
            <div *ngIf="activeFormTab === 'tr'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudProjTitleTR">Proje Başlığı (TR)</label>
                    <input type="text" id="crudProjTitleTR" name="projTitleTR" [(ngModel)]="projTitle_TR" required placeholder="Örn: Platar LPR — Plaka Tanıma Sistemi">
                </div>
                <div class="form-group">
                    <label for="crudProjSubTagTR">Üst Etiket / SubTag (TR)</label>
                    <input type="text" id="crudProjSubTagTR" name="projSubTagTR" [(ngModel)]="projSubTag_TR" required placeholder="Örn: MAKİNE ÖĞRENİMİ & DERİN ÖĞRENME">
                </div>
                <div class="form-group">
                    <label for="crudProjDescTR">Kısa Açıklama (TR)</label>
                    <textarea id="crudProjDescTR" name="projDescTR" [(ngModel)]="projDesc_TR" rows="2" required placeholder="Kart özet metni..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudProjDetailTR">Detaylı Bilgiler (TR - HTML Formatında)</label>
                    <textarea id="crudProjDetailTR" name="projDetailTR" [(ngModel)]="projDetail_TR" rows="4" required placeholder="Makale içeriği..."></textarea>
                </div>
            </div>

            <!-- Tab content: English -->
            <div *ngIf="activeFormTab === 'en'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudProjTitleEN">Project Title (EN)</label>
                    <input type="text" id="crudProjTitleEN" name="projTitleEN" [(ngModel)]="projTitle_EN" required placeholder="E.g. Platar LPR — License Plate Recognition">
                </div>
                <div class="form-group">
                    <label for="crudProjSubTagEN">Sub Tag (EN)</label>
                    <input type="text" id="crudProjSubTagEN" name="projSubTagEN" [(ngModel)]="projSubTag_EN" required placeholder="E.g. MACHINE LEARNING & DEEP LEARNING">
                </div>
                <div class="form-group">
                    <label for="crudProjDescEN">Short Description (EN)</label>
                    <textarea id="crudProjDescEN" name="projDescEN" [(ngModel)]="projDesc_EN" rows="2" required placeholder="Card excerpt summary..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudProjDetailEN">Detailed Information (EN - HTML Format)</label>
                    <textarea id="crudProjDetailEN" name="projDetailEN" [(ngModel)]="projDetail_EN" rows="4" required placeholder="Detailed markup page..."></textarea>
                </div>
            </div>

            <!-- Tab content: Deutsch -->
            <div *ngIf="activeFormTab === 'de'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudProjTitleDE">Projektname (DE)</label>
                    <input type="text" id="crudProjTitleDE" name="projTitleDE" [(ngModel)]="projTitle_DE" required placeholder="Z.B. Platar LPR — Kennzeichenerkennung">
                </div>
                <div class="form-group">
                    <label for="crudProjSubTagDE">Sub-Etikett (DE)</label>
                    <input type="text" id="crudProjSubTagDE" name="projSubTagDE" [(ngModel)]="projSubTag_DE" required placeholder="Z.B. MASCHINELLES LERNEN & DEEP LEARNING">
                </div>
                <div class="form-group">
                    <label for="crudProjDescDE">Kurzbeschreibung (DE)</label>
                    <textarea id="crudProjDescDE" name="projDescDE" [(ngModel)]="projDesc_DE" rows="2" required placeholder="Kartenbeschreibung..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudProjDetailDE">Detailierte Beschreibung (DE - HTML-Format)</label>
                    <textarea id="crudProjDetailDE" name="projDetailDE" [(ngModel)]="projDetail_DE" rows="4" required placeholder="Ausführlicher Artikel..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">
                <span>Proje Verilerini Kaydet</span>
            </button>
        </form>
    </div>
</div>
