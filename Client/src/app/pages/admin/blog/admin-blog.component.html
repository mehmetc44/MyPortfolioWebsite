<div class="admin-panel-title-row">
    <div class="pane-header-hero">
        <span class="subtitle-tag">MAKALELER TABLOSU</span>
        <h3 class="pane-main-title">Blog Yönetimi</h3>
        <div class="title-decorator-line"></div>
    </div>
    <button class="btn btn-primary btn-add-new" (click)="openNewArticleModal()">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" class="btn-icon-left"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Yeni Makale Ekle</span>
    </button>
</div>

<!-- Articles list Table layout -->
<div class="table-wrapper">
    <table class="admin-table">
        <thead>
            <tr>
                <th>Makale Başlığı (TR)</th>
                <th>Kategori</th>
                <th>Tarih</th>
                <th>Okuma Süresi</th>
                <th style="width: 150px; text-align: center;">İşlemler</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let art of articles; let idx = index">
                <td style="font-weight: 700; color: var(--accent-navy-text, var(--accent-navy));">{{ art.title_TR }}</td>
                <td><span class="blog-category-tag category-tag-{{art.category}}">{{ art.category }}</span></td>
                <td>{{ art.date }}</td>
                <td>{{ art.readTime }}</td>
                <td>
                    <div class="actions-col-cell">
                        <button class="btn-action-edit" (click)="openEditArticleModal(idx)" title="Düzenle">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="btn-action-delete" (click)="deleteArticle(idx)" title="Sil">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </td>
            </tr>
            <tr *ngIf="articles.length === 0">
                <td colspan="5" style="text-align: center; padding: 24px;">Kayıtlı makale bulunmamaktadır.</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- BLOG CRUD FORM MODAL OVERLAY -->
<div id="blogCrudModal" class="modal-overlay" [class.show]="showArticleModal" role="dialog" aria-modal="true" aria-labelledby="blogModalTitle">
    <div class="modal-content glass-card admin-modal">
        <button class="modal-close-btn" (click)="closeArticleModal()" aria-label="Close modal">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        
        <h2 id="blogModalTitle" class="modal-title">{{ articleModalTitle }}</h2>
        <p class="modal-subtitle">Makaleye ait tüm genel ve çok dilli detayları girin.</p>
        
        <form (ngSubmit)="saveArticle()" class="contact-form">
            <!-- General configurations -->
            <div class="form-double-row">
                <div class="form-group">
                    <label for="crudBlogId">Makale ID / Slug (Değiştirilemez)</label>
                    <input type="text" id="crudBlogId" name="artId" [(ngModel)]="artId" required placeholder="Örn: saas-multitenancy" [disabled]="editingArticleIdx >= 0">
                </div>
                <div class="form-group">
                    <label for="crudBlogCategory">Kategori</label>
                    <select id="crudBlogCategory" name="artCategory" [(ngModel)]="artCategory" class="admin-select" required>
                        <option value="architecture">Yazılım Mimarisi</option>
                        <option value="ai">Yapay Zeka</option>
                        <option value="frontend">Ön Uç &amp; Tasarım</option>
                        <option value="other">Diğer</option>
                    </select>
                </div>
            </div>

            <div class="form-double-row">
                <div class="form-group">
                    <label for="crudBlogDate">Tarih</label>
                    <input type="text" id="crudBlogDate" name="artDate" [(ngModel)]="artDate" required placeholder="Örn: Nisan 2026">
                </div>
                <div class="form-group">
                    <label for="crudBlogReadTime">Okuma Süresi</label>
                    <input type="text" id="crudBlogReadTime" name="artReadTime" [(ngModel)]="artReadTime" required placeholder="Örn: 6 dk okuma">
                </div>
            </div>

            <!-- Language Translation Tabs Switcher -->
            <div class="modal-tabs">
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'tr'" (click)="activeFormTab = 'tr'">Türkçe (TR)</button>
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'en'" (click)="activeFormTab = 'en'">English (EN)</button>
                <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'de'" (click)="activeFormTab = 'de'">Deutsch (DE)</button>
            </div>

            <!-- Tab content: Türkçe -->
            <div *ngIf="activeFormTab === 'tr'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudBlogTitleTR">Makale Başlığı (TR)</label>
                    <input type="text" id="crudBlogTitleTR" name="artTitleTR" [(ngModel)]="artTitle_TR" required placeholder="Örn: SaaS Mimarilerinde Çok Kiracılı Veri Güvenliği">
                </div>
                <div class="form-group">
                    <label for="crudBlogSubTagTR">Üst Etiket / SubTag (TR)</label>
                    <input type="text" id="crudBlogSubTagTR" name="artSubTagTR" [(ngModel)]="artSubTag_TR" required placeholder="Örn: SOFTWARE ARCHITECTURE & POSTGRESQL">
                </div>
                <div class="form-group">
                    <label for="crudBlogExcerptTR">Kısa Özet (TR)</label>
                    <textarea id="crudBlogExcerptTR" name="artExcerptTR" [(ngModel)]="artExcerpt_TR" rows="2" required placeholder="Giriş özet metni..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudBlogDetailTR">Makale İçeriği (TR - HTML Formatında)</label>
                    <textarea id="crudBlogDetailTR" name="artDetailTR" [(ngModel)]="artDetail_TR" rows="6" required placeholder="Detay makalesi içeriği..."></textarea>
                </div>
            </div>

            <!-- Tab content: English -->
            <div *ngIf="activeFormTab === 'en'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudBlogTitleEN">Article Title (EN)</label>
                    <input type="text" id="crudBlogTitleEN" name="artTitleEN" [(ngModel)]="artTitle_EN" required placeholder="E.g. Multi-Tenant Data Isolation in SaaS Systems">
                </div>
                <div class="form-group">
                    <label for="crudBlogSubTagEN">Sub Tag (EN)</label>
                    <input type="text" id="crudBlogSubTagEN" name="artSubTagEN" [(ngModel)]="artSubTag_EN" required placeholder="E.g. SOFTWARE ARCHITECTURE & POSTGRESQL">
                </div>
                <div class="form-group">
                    <label for="crudBlogExcerptEN">Short Excerpt (EN)</label>
                    <textarea id="crudBlogExcerptEN" name="artExcerptEN" [(ngModel)]="artExcerpt_EN" rows="2" required placeholder="Card excerpt description..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudBlogDetailEN">Article Body (EN - HTML Format)</label>
                    <textarea id="crudBlogDetailEN" name="artDetailEN" [(ngModel)]="artDetail_EN" rows="6" required placeholder="Detailed markup page..."></textarea>
                </div>
            </div>

            <!-- Tab content: Deutsch -->
            <div *ngIf="activeFormTab === 'de'" class="tab-content-panel">
                <div class="form-group">
                    <label for="crudBlogTitleDE">Artikelüberschrift (DE)</label>
                    <input type="text" id="crudBlogTitleDE" name="artTitleDE" [(ngModel)]="artTitle_DE" required placeholder="Z.B. Mandantenfähige Datenisolation in SaaS-Architekturen">
                </div>
                <div class="form-group">
                    <label for="crudBlogSubTagDE">Sub-Etikett (DE)</label>
                    <input type="text" id="crudBlogSubTagDE" name="artSubTagDE" [(ngModel)]="artSubTag_DE" required placeholder="Z.B. SOFTWAREARCHITEKTUR & POSTGRESQL">
                </div>
                <div class="form-group">
                    <label for="crudBlogExcerptDE">Auszug / Zusammenfassung (DE)</label>
                    <textarea id="crudBlogExcerptDE" name="artExcerptDE" [(ngModel)]="artExcerpt_DE" rows="2" required placeholder="Beschreibungstext..."></textarea>
                </div>
                <div class="form-group">
                    <label for="crudBlogDetailDE">Artikelinhalt (DE - HTML-Format)</label>
                    <textarea id="crudBlogDetailDE" name="artDetailDE" [(ngModel)]="artDetail_DE" rows="6" required placeholder="Ausführlicher Artikeltext..."></textarea>
                </div>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">
                <span>Makale Verilerini Kaydet</span>
            </button>
        </form>
    </div>
</div>
