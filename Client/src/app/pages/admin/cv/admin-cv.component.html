<div class="pane-header-hero">
    <span class="subtitle-tag">ÖZGEÇMİŞ YAPILANDIRMASI</span>
    <h3 class="pane-main-title">Özgeçmiş Ayarları</h3>
    <div class="title-decorator-line"></div>
</div>

<form (ngSubmit)="saveCv()" class="contact-form" *ngIf="profile">
    <!-- Language Translation Tabs Switcher -->
    <div class="modal-tabs">
        <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'tr'" (click)="activeFormTab = 'tr'">Türkçe (TR)</button>
        <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'en'" (click)="activeFormTab = 'en'">English (EN)</button>
        <button type="button" class="modal-tab-btn" [class.active]="activeFormTab === 'de'" (click)="activeFormTab = 'de'">Deutsch (DE)</button>
    </div>

    <!-- Tab Content: Türkçe -->
    <div [hidden]="activeFormTab !== 'tr'" class="tab-content-panel">
        <div class="form-group">
            <label>Türkçe Özgeçmiş PDF Dosyası (.pdf)</label>
            <div class="avatar-upload-container">
                <input type="file" (change)="onFileSelected($event, 'tr')" accept=".pdf" class="file-input">
                <span *ngIf="isUploading.tr" style="font-size: 0.85rem; color: var(--text-secondary);">Yükleniyor...</span>
                <div class="cv-file-info" style="margin-top: 8px;" *ngIf="profile.cvPdfUrl_TR">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Mevcut PDF: <code>{{ profile.cvPdfUrl_TR }}</code></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Özgeçmiş Metin İçeriği (TR - Görsel Editör)</label>
            <div class="wysiwyg-editor-container">
                <div class="wysiwyg-toolbar">
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('bold')" title="Kalın (Bold)"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('italic')" title="Eğik (Italic)"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('underline')" title="Altı Çizili"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h4')" title="Başlık H4"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H4</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h5')" title="Başlık H5"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H5</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertUnorderedList')" title="Liste"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertHorizontalRule')" title="Ayırıcı Çizgi"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">●●●</span></button>
                </div>
                <div #editorTR class="wysiwyg-editor" contenteditable="true" (input)="onEditorInput('tr', editorTR.innerHTML)" placeholder="Özgeçmişinizi yazın..."></div>
            </div>
        </div>
    </div>

    <!-- Tab Content: English -->
    <div [hidden]="activeFormTab !== 'en'" class="tab-content-panel">
        <div class="form-group">
            <label>English CV PDF File (.pdf)</label>
            <div class="avatar-upload-container">
                <input type="file" (change)="onFileSelected($event, 'en')" accept=".pdf" class="file-input">
                <span *ngIf="isUploading.en" style="font-size: 0.85rem; color: var(--text-secondary);">Uploading...</span>
                <div class="cv-file-info" style="margin-top: 8px;" *ngIf="profile.cvPdfUrl_EN">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Current PDF: <code>{{ profile.cvPdfUrl_EN }}</code></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>CV Text Content (EN - Visual Editor)</label>
            <div class="wysiwyg-editor-container">
                <div class="wysiwyg-toolbar">
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('bold')" title="Bold"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('italic')" title="Italic"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('underline')" title="Underline"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h4')" title="Heading H4"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H4</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h5')" title="Heading H5"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H5</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertUnorderedList')" title="Unordered List"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertHorizontalRule')" title="Separator Line"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">●●●</span></button>
                </div>
                <div #editorEN class="wysiwyg-editor" contenteditable="true" (input)="onEditorInput('en', editorEN.innerHTML)" placeholder="Write your CV here..."></div>
            </div>
        </div>
    </div>

    <!-- Tab Content: Deutsch -->
    <div [hidden]="activeFormTab !== 'de'" class="tab-content-panel">
        <div class="form-group">
            <label>Deutsche Lebenslauf PDF Datei (.pdf)</label>
            <div class="avatar-upload-container">
                <input type="file" (change)="onFileSelected($event, 'de')" accept=".pdf" class="file-input">
                <span *ngIf="isUploading.de" style="font-size: 0.85rem; color: var(--text-secondary);">Hochladen...</span>
                <div class="cv-file-info" style="margin-top: 8px;" *ngIf="profile.cvPdfUrl_DE">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Aktuelles PDF: <code>{{ profile.cvPdfUrl_DE }}</code></span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Lebenslaufinhalt (DE - Visueller Editor)</label>
            <div class="wysiwyg-editor-container">
                <div class="wysiwyg-toolbar">
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('bold')" title="Fett"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('italic')" title="Kursiv"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('underline')" title="Unterstrichen"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path><line x1="4" y1="21" x2="20" y2="21"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h4')" title="H4 Überschrift"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H4</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('formatBlock', 'h5')" title="H5 Überschrift"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">H5</span></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertUnorderedList')" title="Liste"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                    <button type="button" class="wysiwyg-btn" (mousedown)="$event.preventDefault(); execCmd('insertHorizontalRule')" title="Trennlinie"><span style="font-family: var(--font-body); font-weight:800; font-size:11px;">●●●</span></button>
                </div>
                <div #editorDE class="wysiwyg-editor" contenteditable="true" (input)="onEditorInput('de', editorDE.innerHTML)" placeholder="Schreiben Sie Ihren Lebenslauf..."></div>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary submit-btn" [disabled]="isSaving" style="margin-top: 24px;">
        <span *ngIf="!isSaving">Özgeçmiş Bilgilerini Kaydet</span>
        <span *ngIf="isSaving">Kaydediliyor...</span>
    </button>
</form>
