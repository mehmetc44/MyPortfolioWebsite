<header class="site-header">
    <nav class="navbar" aria-label="Main Navigation">
        <div class="nav-container">
            <a routerLink="/" class="nav-logo">
                <span class="logo-accent">{{ logoName }}</span>
                <span class="logo-text">.dev</span>
            </a>
            <div class="nav-links">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">{{ 'NAV_HOME' | translate }}</a>
                <a routerLink="/about" routerLinkActive="active" class="nav-item">{{ 'NAV_ABOUT' | translate }}</a>
                <a routerLink="/portfolio" routerLinkActive="active" class="nav-item">{{ 'NAV_PORTFOLIO' | translate }}</a>
                <a routerLink="/blog" routerLinkActive="active" class="nav-item">{{ 'NAV_BLOG' | translate }}</a>
                <a href="#" (click)="openContact($event)" class="nav-item">{{ 'NAV_CONTACT' | translate }}</a>
                <div class="nav-controls">
                    <select [ngModel]="activeLang" (ngModelChange)="changeLanguage($event)" class="lang-dropdown" aria-label="Language Selector">
                        <option value="tr">TR</option>
                        <option value="en">EN</option>
                        <option value="de">DE</option>
                    </select>
                    <button (click)="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle Theme">
                        <!-- Sun Icon (when theme is dark) -->
                        <svg *ngIf="isDarkMode" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <!-- Moon Icon (when theme is light) -->
                        <svg *ngIf="!isDarkMode" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>
</header>

<router-outlet></router-outlet>

<app-contact-modal [isOpen]="showContact" (close)="onContactClose()"></app-contact-modal>
